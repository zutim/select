<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化分析平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <script src="/static/js/chart.umd.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-4">量化分析平台</h1>
                
                <!-- 控制面板 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>控制面板</h5>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs" id="myTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="analysis-tab" data-bs-toggle="tab" data-bs-target="#analysis" type="button" role="tab">策略分析</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="backtest-tab" data-bs-toggle="tab" data-bs-target="#backtest" type="button" role="tab">回测系统</button>
                            </li>
                        </ul>
                        <div class="tab-content mt-3" id="myTabContent">
                            <!-- 策略分析标签页 -->
                            <div class="tab-pane fade show active" id="analysis" role="tabpanel">
                                <div class="row">
                                    <div class="col-md-4">
                                        <label for="dateSelect" class="form-label">选择日期</label>
                                        <select class="form-select" id="dateSelect">
                                            <option value="">加载中...</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="strategySelect" class="form-label">选择策略</label>
                                        <select class="form-select" id="strategySelect">
                                            <option value="all">所有策略</option>
                                            <option value="First Board High Open">首板高开</option>
                                            <option value="First Board Low Open">首板低开</option>
                                            <option value="Weak to Strong">弱转强</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 d-flex align-items-end">
                                        <button id="runAnalysisBtn" class="btn btn-primary w-100">运行分析</button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 回测标签页 -->
                            <div class="tab-pane fade" id="backtest" role="tabpanel">
                                <div class="row">
                                    <div class="col-md-3">
                                        <label for="startDate" class="form-label">开始日期</label>
                                        <input type="date" class="form-control" id="startDate">
                                    </div>
                                    <div class="col-md-3">
                                        <label for="endDate" class="form-label">结束日期</label>
                                        <input type="date" class="form-control" id="endDate">
                                    </div>
                                    <div class="col-md-3">
                                        <label for="initialCapital" class="form-label">初始资金</label>
                                        <input type="number" class="form-control" id="initialCapital" value="1000000">
                                    </div>
                                    <div class="col-md-3">
                                        <label for="backtestStrategySelect" class="form-label">策略</label>
                                        <select class="form-select" id="backtestStrategySelect">
                                            <option value="all">所有策略</option>
                                            <option value="First Board High Open">首板高开</option>
                                            <option value="First Board Low Open">首板低开</option>
                                            <option value="Weak to Strong">弱转强</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <button id="runBacktestBtn" class="btn btn-success w-100">运行回测</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <button id="refreshBtn" class="btn btn-secondary me-2">刷新数据</button>
                            <button id="exportBtn" class="btn btn-success">导出结果</button>
                        </div>
                    </div>
                </div>
                
                <!-- 系统状态 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>系统状态</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <strong>状态:</strong> <span id="systemStatus">未知</span>
                            </div>
                            <div class="col-md-3">
                                <strong>版本:</strong> <span id="systemVersion">-</span>
                            </div>
                            <div class="col-md-3">
                                <strong>最后更新:</strong> <span id="lastUpdate">-</span>
                            </div>
                            <div class="col-md-3">
                                <strong>可用日期数:</strong> <span id="availableDatesCount">-</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 回测结果展示区 -->
                <div class="card mb-4 d-none" id="backtestResultsCard">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5>回测结果</h5>
                        <button class="btn btn-sm btn-outline-secondary" id="hideBacktestResults">隐藏</button>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>总收益率</h6>
                                    <p id="totalReturn" class="metric-value">0.00%</p>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>年化收益率</h6>
                                    <p id="annualReturn" class="metric-value">0.00%</p>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>波动率</h6>
                                    <p id="volatility" class="metric-value">0.00%</p>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>最大回撤</h6>
                                    <p id="maxDrawdown" class="metric-value">0.00%</p>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>夏普比率</h6>
                                    <p id="sharpeRatio" class="metric-value">0.00</p>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="metric-box">
                                    <h6>胜率</h6>
                                    <p id="winRate" class="metric-value">0.00%</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-12">
                                <h6>净值曲线图</h6>
                                <canvas id="equityChart" height="300"></canvas>
                            </div>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-12">
                                <h6>收益率分布图</h6>
                                <canvas id="returnsChart" height="300"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 分析结果 -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5>分析结果</h5>
                        <span>共 <span id="resultCount">0</span> 只股票</span>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="resultsTable">
                                <thead>
                                    <tr>
                                        <th>代码</th>
                                        <th>名称</th>
                                        <th>日期</th>
                                        <th>策略</th>
                                    </tr>
                                </thead>
                                <tbody id="resultsBody">
                                    <!-- Results will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
